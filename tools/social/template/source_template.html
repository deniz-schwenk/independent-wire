:root {
  /* ---------- Type families ---------- */
  --font-sans: 'Space Grotesk', 'DM Sans', system-ui, sans-serif;
  --font-mono: 'Space Mono', 'Courier New', monospace;
  --font-display: var(--font-sans);
  --font-body: var(--font-sans);
  --font-label: var(--font-mono);

  /* ---------- Type scale (raw) ---------- */
  --fs-xxs: 0.6rem;   /* meta-label, smallest table caps */
  --fs-xs:  0.7rem;   /* topic-id, badges, footer, table headers */
  --fs-sm:  0.8rem;   /* date-bar, mono captions */
  --fs-base:0.95rem;  /* card body, summary, secondary */
  --fs-md:  1rem;     /* card actor, default body */
  --fs-lg:  1.125rem; /* article body */
  --fs-xl:  1.25rem;  /* h2 */
  --fs-2xl: 1.5rem;   /* card h2 */
  --fs-3xl: 1.8rem;   /* dossier h1 */
  --fs-4xl: 2rem;     /* index h1 (wordmark) */

  --lh-tight: 1.25; /* @kind other */
  --lh-snug:  1.3; /* @kind other */
  --lh-base:  1.55; /* @kind other */
  --lh-body:  1.7; /* @kind other */
  --tight-letter: -0.03em;
  --display-letter: -0.02em;
  --label-letter: 0.05em;
  --label-letter-loose: 0.12em;
  --label-letter-loosest: 0.15em;

  /* ---------- Semantic type tokens ---------- */
  --t-h1-size: var(--fs-3xl);
  --t-h1-weight: 800;
  --t-h1-letter: var(--display-letter);
  --t-h1-line: var(--lh-tight);

  --t-h2-size: var(--fs-xl);
  --t-h2-weight: 700;
  --t-h2-letter: 0;
  --t-h2-line: var(--lh-snug);

  --t-card-title-size: var(--fs-2xl);
  --t-card-title-weight: 800;
  --t-card-title-letter: var(--display-letter);

  --t-wordmark-size: var(--fs-4xl);
  --t-wordmark-weight: 900;
  --t-wordmark-letter: var(--tight-letter);

  --t-body-size: var(--fs-md);
  --t-body-line: var(--lh-body);

  --t-label-size: var(--fs-xs);
  --t-label-letter: var(--label-letter-loose);

  --t-meta-number-size: 1.4rem;
  --t-meta-number-weight: 700;

  /* ---------- Color: neutrals ---------- */
  --color-text:           #000000;
  --color-text-secondary: #444444;
  --color-text-subtle:    #999999;
  --color-bg:             #ffffff;
  --color-bg-subtle:      #f5f5f5;
  --color-border:         #000000;
  --color-border-light:   #e0e0e0;

  /* ---------- Color: action ---------- */
  --color-primary: #3b82f6; /* source citations + hyperlinks */

  /* ---------- Color: semantic (transparency UI only) ---------- */
  --color-strong:   #0f766e; /* strong representation / low severity */
  --color-moderate: #ca8a04; /* moderate / omission / evaluative_adjective */
  --color-weak:     #9f1239; /* weak / factual / loaded_term / critical */
  --color-framing:  #7c3aed; /* framing divergence */
  --color-emphasis: #0369a1; /* emphasis divergence / intensifier */
  --color-factual:  var(--color-weak);
  --color-omission: var(--color-moderate);
  --color-hedging:  #64748b; /* hedging / muted neutral tag */

  /* ---------- Color: region accents (source-network only) ---------- */
  --color-region-americas:   #3b82f6;
  --color-region-europe:     #6366f1;
  --color-region-east-asia:  #0891b2;
  --color-region-mena:       #8b5cf6;
  --color-region-muted:      #64748b;
  --color-region-faded:      #cbd5e1;

  /* ---------- Borders / rules (the load-bearing element) ---------- */
  --rule-heavy: 3px solid var(--color-border);   /* section breaks */
  --rule-frame: 1px solid var(--color-border);   /* component frames */
  --rule-hair:  1px solid var(--color-border-light); /* table rows */
  --rule-quote: 3px solid var(--color-border);   /* left-bar pull-quote */
  --rule-quote-thin: 2px solid var(--color-border);

  /* ---------- Spacing ---------- */
  --sp-1: 0.25rem;
  --sp-2: 0.5rem;
  --sp-3: 0.75rem;
  --sp-4: 1rem;
  --sp-5: 1.25rem;
  --sp-6: 1.5rem;
  --sp-8: 2rem;
  --sp-10: 2.5rem;
  --sp-12: 3rem;

  /* ---------- Radius / shadow (declared zero on purpose) ---------- */
  --radius: 0;
  --shadow: none;

  /* ---------- Layout ---------- */
  --col-max: 740px;
  --col-pad: 2rem 1rem;
}

/* ===== Semantic helper classes (optional usage) ===== */

.iw-h1 {
  font-family: var(--font-display);
  font-size: var(--t-h1-size);
  font-weight: var(--t-h1-weight);
  letter-spacing: var(--t-h1-letter);
  line-height: var(--t-h1-line);
  color: var(--color-text);
  margin: 0;
}
.iw-h2 {
  font-family: var(--font-display);
  font-size: var(--t-h2-size);
  font-weight: var(--t-h2-weight);
  line-height: var(--t-h2-line);
  margin: var(--sp-10) 0 var(--sp-4);
  padding-bottom: var(--sp-2);
  border-bottom: var(--rule-heavy);
  color: var(--color-text);
}
.iw-wordmark {
  font-family: var(--font-display);
  font-size: var(--t-wordmark-size);
  font-weight: var(--t-wordmark-weight);
  letter-spacing: var(--t-wordmark-letter);
  text-transform: uppercase;
  color: var(--color-text);
  line-height: 1;
}
.iw-tagline {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  letter-spacing: var(--label-letter);
  text-transform: uppercase;
  color: #666;
}
.iw-body {
  font-family: var(--font-body);
  font-size: var(--t-body-size);
  line-height: var(--t-body-line);
  color: var(--color-text);
}
.iw-label {
  font-family: var(--font-label);
  font-size: var(--t-label-size);
  letter-spacing: var(--t-label-letter);
  text-transform: uppercase;
  color: var(--color-text-subtle);
}
.iw-meta-number {
  font-family: var(--font-mono);
  font-size: var(--t-meta-number-size);
  font-weight: var(--t-meta-number-weight);
  color: var(--color-text);
}
.iw-pull {
  border-left: var(--rule-quote);
  padding-left: var(--sp-3);
  color: var(--color-text-secondary);
  font-family: var(--font-body);
}
.iw-card {
  border: var(--rule-frame);
  border-radius: var(--radius);
  background: var(--color-bg);
  padding: var(--sp-4) var(--sp-5);
  box-shadow: var(--shadow);
}
.iw-badge {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: var(--label-letter);
  white-space: nowrap;
  background: #00000010;
  border: 1px solid #00000040;
  color: var(--color-text);
}
</style>

  &quot;sourceB&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;IRNA · FA&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Inhalt&quot; },
  &quot;dossierId&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;tp-2026-04-19-001&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Inhalt&quot; },
  &quot;dossierDate&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;April 19, 2026&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Inhalt&quot; }
}">
class Component extends DCLogic {
  state = { fontsReady: false };

  componentDidMount() {
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => this.setState({ fontsReady: true }));
    }
  }

  // Breite eines Wortes: verdecktes DOM-Element mit exakt den Inline-Styles des Motivs
  measure(text, size) {
    if (!this._probe) {
      const el = document.createElement('span');
      el.style.position = 'absolute';
      el.style.visibility = 'hidden';
      el.style.left = '-99999px';
      el.style.top = '0';
      el.style.whiteSpace = 'nowrap';
      el.style.fontFamily = "'Space Grotesk', sans-serif";
      el.style.fontWeight = '800';
      el.style.letterSpacing = '-0.04em';
      el.style.lineHeight = '1';
      document.body.appendChild(el);
      this._probe = el;
    }
    this._probe.style.fontSize = size + 'px';
    this._probe.textContent = text;
    return this._probe.getBoundingClientRect().width;
  }

  renderVals() {
    const wordA = this.props.wordA ?? 'seizure';
    const wordB = this.props.wordB ?? 'piracy';
    const layout = this.props.layout ?? 'auto';

    // Innenbreite: 1080 - 2*88 Padding
    const inner = 904;
    // Nebeneinander: Slash (~40px) + 2 * 40px gap abziehen
    const rowAvail = inner - 120;
    const combined = this.measure(wordA, 100) + this.measure(wordB, 100);
    let rowSize = Math.min(150, Math.floor((rowAvail * 100) / Math.max(1, combined)));
    // Sicherheits-Klammer: reale Breite bei Zielgröße nachmessen
    while (rowSize > 40 && this.measure(wordA, rowSize) + this.measure(wordB, rowSize) + 120 > inner) {
      rowSize -= 2;
    }

    // Gestapelt: jedes Wort darf die volle Innenbreite nutzen
    const widest = Math.max(this.measure(wordA, 100), this.measure(wordB, 100));
    let stackSize = Math.min(190, Math.floor((inner * 100) / Math.max(1, widest)));
    while (stackSize > 40 && Math.max(this.measure(wordA, stackSize), this.measure(wordB, stackSize)) > inner) {
      stackSize -= 2;
    }

    // Auto: stapeln, sobald die Zeile unter 96px fallen würde
    let stacked;
    if (layout === 'nebeneinander') stacked = false;
    else if (layout === 'gestapelt') stacked = true;
    else stacked = rowSize < 96;

    return {
      wordA: wordA,
      wordB: wordB,
      isRow: !stacked,
      isStacked: stacked,
      rowFontSize: rowSize + 'px',
      rowSlashSize: Math.round(rowSize * 0.42) + 'px',
      stackFontSize: stackSize + 'px',
      originalA: this.props.originalA ?? '\u201Cseizure\u201D',
      originalB: this.props.originalB ?? '\u200F\u201C\u062F\u0632\u062F\u06CC \u062F\u0631\u06CC\u0627\u06CC\u06CC\u201D',
      sourceA: this.props.sourceA ?? 'U.S. CENTCOM \u00B7 EN',
      sourceB: this.props.sourceB ?? 'IRNA \u00B7 FA',
      dossierId: this.props.dossierId ?? 'tp-2026-04-19-001',
      dossierDate: this.props.dossierDate ?? 'April 19, 2026'
    };
  }
}
</script>
